<body style="margin:0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #1c4f82, #2e6ea3); height:100vh; display:flex; align-items:center; justify-content:center;">

<div style="background:white; padding:30px; border-radius:10px; width:100%; max-width:350px; box-shadow:0 10px 25px rgba(0,0,0,0.2); text-align:center;">

<h2 style="margin-bottom:20px;">Member Login</h2>

<form action="YOUR_FORM_ENDPOINT" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required
style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;"
>

<input
type="password"
name="password"
placeholder="Password"
required
style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;"
>

<button
type="submit"
style="width:100%; padding:10px; background:#1c4f82; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;"
>
Sign In
</button>

</form>

<p style="margin-top:15px; font-size:14px;">
<a href="#" style="color:#1c4f82; text-decoration:none;">Forgot password?</a>
</p>

</div>

</body>
